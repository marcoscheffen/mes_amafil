<!DOCTYPE html>
<html lang="pt-BR" class="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ayvi - AI Agent Manager</title>
        <link
            rel="icon"
            type="image/png"
            href="https://tfkvgkkqpmafvczodnco.supabase.co/storage/v1/object/public/Logo/ayvi_logo_w.png"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
            rel="stylesheet"
        >
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="error-overlay" style="position: fixed; z-index: 99999; top: 0; left: 0; right: 0; background: red; color: white; padding: 20px; font-family: monospace; display: none; white-space: pre-wrap; font-size: 14px;"></div>
        <script>
            window.onerror = function(msg, url, line, col, error) {
                var el = document.getElementById('error-overlay');
                el.style.display = 'block';
                var text = msg + "\n" + url + ":" + line + ":" + col;
                if (error && error.stack) text += "\n" + error.stack;
                el.textContent += "\n\n" + text;
            };
            window.onunhandledrejection = function(event) {
                var el = document.getElementById('error-overlay');
                el.style.display = 'block';
                el.textContent += "\n\nPromise Rejection: " + (event.reason && event.reason.stack ? event.reason.stack : event.reason);
            };
        </script>
        <div id="root"></div>
        <script type="module" src="/index.tsx"></script>
    </body>
</html>
